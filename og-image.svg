<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a0a0a"/>
      <stop offset="55%"  stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#0a2744"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0077b6"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative rings -->
  <circle cx="960" cy="315" r="220" fill="none" stroke="rgba(0,180,216,0.10)" stroke-width="1.5"/>
  <circle cx="960" cy="315" r="290" fill="none" stroke="rgba(0,180,216,0.07)" stroke-width="1.5"/>
  <circle cx="960" cy="315" r="360" fill="none" stroke="rgba(0,180,216,0.04)" stroke-width="1.5"/>

  <!-- Logo circle -->
  <circle cx="960" cy="315" r="155" fill="rgba(0,119,182,0.12)" stroke="rgba(0,180,216,0.25)" stroke-width="1.5"/>
  <image href="https://lh3.googleusercontent.com/d/1o3bArnfqG38fcdhGty3-NxjAXBvCKq86"
         x="810" y="165" width="300" height="300"
         preserveAspectRatio="xMidYMid meet"/>

  <!-- Accent bar -->
  <rect x="80" y="230" width="5" height="120" fill="url(#accent)" rx="3"/>

  <!-- Brand name -->
  <text x="108" y="295" font-family="Arial Black, sans-serif" font-weight="900" font-size="72" fill="#ffffff" letter-spacing="2">PINA</text>
  <text x="108" y="360" font-family="Arial, sans-serif" font-weight="400" font-size="36" fill="rgba(255,255,255,0.75)" letter-spacing="8">WATER SYSTEM</text>

  <!-- Tagline -->
  <text x="108" y="420" font-family="Arial, sans-serif" font-size="22" fill="#00b4d8" letter-spacing="1">Agua Pura y Limpia para Tu Hogar</text>

  <!-- Divider -->
  <rect x="108" y="448" width="400" height="1.5" fill="rgba(255,255,255,0.12)" rx="1"/>

  <!-- Bottom info -->
  <text x="108" y="490" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.5)" letter-spacing="0.5">South Florida  ·  NSF Certified  ·  BBB A+  ·  Lifetime Warranty</text>

  <!-- Phone -->
  <text x="108" y="530" font-family="Arial, sans-serif" font-weight="700" font-size="22" fill="rgba(255,255,255,0.7)">📞 786-342-4247</text>
</svg>
